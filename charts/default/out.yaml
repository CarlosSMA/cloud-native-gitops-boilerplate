# Source: liferay-default/templates/tests/test-connection.yaml
apiVersion: v1
kind: Pod
metadata:
    annotations:
        helm.sh/hook: test
    labels:
        app.kubernetes.io/instance: liferay-aws
        app.kubernetes.io/name: liferay-default
        app.kubernetes.io/managed-by: Helm
        app.kubernetes.io/version: "latest"
        helm.sh/chart: liferay-default-0.2.0
        origin: liferay-cloud
    name: liferay-default-test-connection
    namespace: liferay-default-dev2
spec:
    containers:
        -   command:
                -   /bin/sh
                -   -c
                -   |
                        trap "echo 'Received signal to terminate.'; exit 0" SIGINT SIGTERM

                        START_TIME=$(date +%s)

                        until nc -vz -w 2 liferay-default 8080
                        do
                            CURRENT_TIME=$(date +%s)

                            DELTA_TIME=$((${CURRENT_TIME} - ${START_TIME}))

                            if [ ${DELTA_TIME} -gt 300 ]
                            then
                                echo "Liferay did not start."

                                exit 1
                            fi

                            echo "Waiting for Liferay..."

                            sleep 2
                        done
            image: busybox:latest
            name: test-connection
    restartPolicy: Never
    serviceAccountName: liferay-default
