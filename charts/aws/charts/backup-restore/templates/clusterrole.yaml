{{- if .Values.createClusterResources -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
    labels:
    {{- include "liferay-aws-backup-restore.labels" . | nindent 8 }}
    name: {{ include "liferay-aws-backup-restore.name" . }}
rules:
    -   apiGroups: [""]
        resources: ["namespaces"]
        verbs:
            -   get
            -   list
    -   apiGroups: [""]
        resourceNames: ["managed-service-details"]
        resources: ["secrets"]
        verbs:
            -   create
            -   get
            -   patch
            -   update
    -   apiGroups: ["apps"]
        resourceNames: [{{ .Values.liferayWorkload.name }}]
        resources: ["statefulsets"]
        verbs:
            -   get
            -   list
            -   patch
            -   watch
    -   apiGroups: ["argoproj.io"]
        resources: ["applications", "workflowtaskresults"]
        verbs:
            -   create
            -   get
            -   list
            -   patch
            -   update
            -   watch
    -   apiGroups: ["aws.liferay.com"]
        resources: ["liferayinfrastructures"]
        verbs:
            -   get
            -   list
    -   apiGroups: ["s3.aws.m.upbound.io"]
        resources: ["buckets"]
        verbs:
            -   get
            -   list
{{- end }}