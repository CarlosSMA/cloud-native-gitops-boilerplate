    namespace: test
spec:
    backup: 
        enabled: false
        rules:
        - retentionDays: 30
          ruleName: daily-backups
          schedule: cron(0 5 * * ? *)
          startWindow: 60
    cmk: 
        enabled: false
    commonTags:
        EnvironmentId: 
        ProjectId: 
    database: 
        autoMinorVersionUpgrade: true
        databaseInsightsMode: standard
        deletionProtection: true
        engine: postgres
        engineVersion: "16.11"
        instanceClass: db.t3.medium
        iops: 12000
        multiAz: false
        storageGB: 20
        storageThroughput: 500
        username: liferay_database_admin
    environmentId: 
    forceDestroy: false
    orphanOnDelete: false
    overlay: 
        {}
    projectId: 
    region: 
    search:
        opensearch: 
            autoSoftwareUpdateEnabled: true
            engineVersion: OpenSearch_2.15
            instanceCount: 2
            instanceType: t3.small.search
            username: liferay_search_admin
            volumeSizeGB: 20
    storage: 
        {}
