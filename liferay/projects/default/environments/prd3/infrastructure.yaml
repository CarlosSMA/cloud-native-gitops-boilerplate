enabled: true
region: us-east-2
database:
  deletionProtection: false
search:
  opensearch:
    instanceCount: 2
  elasticsearch:
    enabled: true
    version: 8.12.0
backup:
  enabled: false
liferay-subchart-backup-restore:
  enabled: false
endpoints:
  runray.xyz:
    hostname: "*.runray.xyz"
    port: 443
    protocol: HTTPS
    tls:
      externalSecretNames:
        - "liferay/certificates/carlos-alvarez/runray.xyz"
license:
  externalSecretName: "liferay/licenses/carlos-alvarez/developer-clustered"
  targetSecretName: "developer-clustered"